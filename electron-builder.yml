appId: com.ailis.desktop
productName: AILIS
artifactName: ${productName}-${version}-${arch}.${ext}
icon: build/icon.png
directories:
  output: F:/AILIS/Build/AILIS
files:
  - dist/**/*
  - electron/**/*
  - scripts/mcp-ailis-research-server.cjs
  - scripts/ailis-crawl4ai-worker.py
  - scripts/ailis-python-search-worker.py
  - installer/ailis-runtime-components.json
  - package.json
extraMetadata:
  main: electron/main.cjs
asar: true
asarUnpack:
  - dist/**/*
  - electron/**/*.cjs
  - electron/**/*.py
  - scripts/**/*.cjs
  - scripts/**/*.py
npmRebuild: false
win:
  icon: build/icon.ico
  executableName: AILIS
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  artifactName: ${productName}-Setup-${version}-win-${arch}.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  include: installer/ailis-runtime-components.nsh
portable:
  artifactName: ${productName}-Portable-${version}-win-${arch}.${ext}
linux:
  icon: build/icon.png
  executableName: ailis
  category: Utility
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64
appImage:
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
deb:
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
