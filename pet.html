<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGril Pet</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        body {
            user-select: none;
            -webkit-user-select: none;
        }

        #pet-shell {
            --pet-dialogue-reserved-top: 0px;
            --pet-dialogue-reserved-left: 0px;
            --pet-dialogue-reserved-right: 0px;
            position: relative;
            width: 100%;
            height: 100%;
            cursor: default;
        }

        #canvas-container {
            position: absolute;
            left: var(--pet-dialogue-reserved-left, 0px);
            right: var(--pet-dialogue-reserved-right, 0px);
            bottom: 0;
            height: calc(100% - var(--pet-dialogue-reserved-top, 0px));
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        .pet-hidden-ui {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            left: -9999px;
            top: -9999px;
        }
    </style>
</head>
<body>
    <div id="pet-shell">
        <div id="canvas-container"></div>

        <div class="pet-hidden-ui" aria-hidden="true">
            <div id="message-list"></div>
            <textarea id="message-input"></textarea>
            <button id="send-btn" type="button">发送</button>
        </div>
    </div>

    <script type="module" src="./src/pet-app.js"></script>
</body>
</html>
