<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGL Region Capture</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            cursor: crosshair;
            font-family: "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        #selection-layer {
            position: fixed;
            inset: 0;
            background: rgba(15, 28, 38, 0.24);
        }

        #selection-box {
            position: fixed;
            left: 0;
            top: 0;
            width: 0;
            height: 0;
            border: 2px solid rgba(255, 255, 255, 0.96);
            background: rgba(115, 184, 229, 0.16);
            box-shadow:
                0 0 0 9999px rgba(15, 28, 38, 0.38),
                0 0 0 1px rgba(30, 72, 98, 0.22) inset;
            display: none;
        }

        #selection-size {
            position: absolute;
            left: 0;
            bottom: -28px;
            padding: 4px 7px;
            border-radius: 6px;
            background: rgba(20, 38, 52, 0.88);
            color: #ffffff;
            font-size: 12px;
            line-height: 1.2;
            white-space: nowrap;
        }

        #region-hint {
            position: fixed;
            left: 50%;
            top: 22px;
            transform: translateX(-50%);
            padding: 8px 12px;
            border-radius: 8px;
            color: #ffffff;
            background: rgba(20, 38, 52, 0.78);
            font-size: 13px;
            line-height: 1.3;
            pointer-events: none;
        }

        #cancel-btn {
            position: fixed;
            right: 18px;
            top: 18px;
            width: 32px;
            height: 32px;
            border: 1px solid rgba(255, 255, 255, 0.36);
            border-radius: 8px;
            color: #ffffff;
            background: rgba(20, 38, 52, 0.7);
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
        }

        #cancel-btn:hover {
            background: rgba(20, 38, 52, 0.9);
        }
    </style>
</head>
<body>
    <div id="selection-layer"></div>
    <div id="selection-box">
        <div id="selection-size"></div>
    </div>
    <div id="region-hint">拖动选择截图区域</div>
    <button id="cancel-btn" type="button" aria-label="取消">×</button>

    <script type="module" src="./src/vision-region-selector.js"></script>
</body>
</html>
