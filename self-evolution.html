<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGRIL Self Evolution Lab</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --ink: #243027;
            --muted: #657268;
            --paper: rgba(255, 252, 239, 0.92);
            --paper-strong: #fffaf0;
            --line: rgba(36, 48, 39, 0.13);
            --green: #326f55;
            --green-soft: rgba(50, 111, 85, 0.14);
            --rust: #b4613e;
            --rust-soft: rgba(180, 97, 62, 0.16);
            --blue: #416f8d;
            --blue-soft: rgba(65, 111, 141, 0.14);
            --shadow: 0 24px 70px rgba(35, 43, 35, 0.16);
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            color: var(--ink);
            font-family: "LXGW WenKai Screen", "ZCOOL XiaoWei", "Microsoft YaHei", serif;
            background:
                radial-gradient(circle at 10% 8%, rgba(180, 97, 62, 0.2), transparent 28%),
                radial-gradient(circle at 82% 10%, rgba(65, 111, 141, 0.18), transparent 30%),
                linear-gradient(135deg, #f3f0dc 0%, #eaf1dc 45%, #e2efe9 100%);
        }

        button,
        input,
        textarea {
            font: inherit;
        }

        button {
            border: 0;
            cursor: pointer;
        }

        #shell {
            display: grid;
            grid-template-rows: auto 1fr;
            height: 100%;
        }

        #topbar {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: start;
            padding: 24px 28px 18px;
            -webkit-app-region: drag;
            background: rgba(255, 250, 240, 0.72);
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(14px);
        }

        #eyebrow {
            color: var(--green);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.13em;
            text-transform: uppercase;
        }

        h1 {
            margin-top: 7px;
            font-size: clamp(30px, 4vw, 54px);
            line-height: 0.98;
            letter-spacing: -0.04em;
        }

        #subtitle {
            max-width: 820px;
            margin-top: 12px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.7;
        }

        #top-actions {
            display: flex;
            gap: 10px;
            -webkit-app-region: no-drag;
        }

        .btn {
            min-height: 40px;
            padding: 0 15px;
            border-radius: 999px;
            color: var(--ink);
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid var(--line);
            transition: transform 0.16s ease, background 0.16s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            background: #fffaf0;
        }

        .btn.primary {
            color: #fffaf0;
            background: var(--green);
            border-color: rgba(50, 111, 85, 0.2);
        }

        .btn.danger {
            color: #7b341f;
            background: var(--rust-soft);
            border-color: rgba(180, 97, 62, 0.22);
        }

        .btn:disabled {
            opacity: 0.48;
            cursor: not-allowed;
            transform: none;
        }

        #content {
            min-height: 0;
            overflow: hidden;
            padding: 20px 28px 28px;
            display: grid;
            grid-template-columns: minmax(340px, 0.95fr) minmax(520px, 1.35fr);
            gap: 18px;
        }

        .panel {
            min-height: 0;
            border: 1px solid var(--line);
            border-radius: 24px;
            background: var(--paper);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .panel-head {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }

        .panel-title {
            font-size: 19px;
            font-weight: 800;
        }

        .panel-copy {
            margin-top: 5px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.5;
        }

        #proposal-list,
        #detail-body {
            height: 100%;
            overflow: auto;
            padding: 16px;
        }

        #summary-strip {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            padding: 16px;
            border-bottom: 1px solid var(--line);
        }

        .metric {
            padding: 13px 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.56);
            border: 1px solid rgba(36, 48, 39, 0.08);
        }

        .metric-value {
            font-size: 26px;
            font-weight: 900;
            line-height: 1;
        }

        .metric-label {
            margin-top: 6px;
            color: var(--muted);
            font-size: 12px;
        }

        #task-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            padding: 0 16px 16px;
        }

        #task-input {
            width: 100%;
            min-height: 42px;
            padding: 10px 13px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.6);
            color: var(--ink);
            outline: none;
        }

        .proposal-card {
            display: grid;
            gap: 8px;
            width: 100%;
            text-align: left;
            margin-bottom: 10px;
            padding: 14px;
            border-radius: 18px;
            border: 1px solid rgba(36, 48, 39, 0.1);
            background: rgba(255, 255, 255, 0.58);
            color: var(--ink);
        }

        .proposal-card.active {
            border-color: rgba(50, 111, 85, 0.42);
            background: linear-gradient(135deg, rgba(50, 111, 85, 0.16), rgba(255, 255, 255, 0.75));
        }

        .proposal-title {
            font-size: 15px;
            font-weight: 800;
        }

        .proposal-summary {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.55;
        }

        .badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 23px;
            padding: 0 8px;
            border-radius: 999px;
            background: var(--green-soft);
            color: var(--green);
            font-size: 11px;
            font-weight: 800;
        }

        .badge.medium,
        .badge.needs_review {
            background: var(--blue-soft);
            color: var(--blue);
        }

        .badge.high,
        .badge.critical,
        .badge.rejected {
            background: var(--rust-soft);
            color: var(--rust);
        }

        .detail-section {
            margin-bottom: 16px;
            padding: 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.56);
            border: 1px solid rgba(36, 48, 39, 0.08);
        }

        .detail-section h2 {
            font-size: 15px;
            margin-bottom: 8px;
        }

        .detail-section p,
        .detail-section li {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.65;
        }

        .detail-section ul {
            display: grid;
            gap: 5px;
            padding-left: 18px;
        }

        .codebox {
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 240px;
            overflow: auto;
            padding: 12px;
            border-radius: 14px;
            background: rgba(36, 48, 39, 0.07);
            color: #2f3d32;
            font-family: "Cascadia Mono", "Consolas", monospace;
            font-size: 12px;
            line-height: 1.55;
        }

        #detail-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 0 16px 16px;
        }

        .empty {
            padding: 24px;
            color: var(--muted);
            line-height: 1.7;
            text-align: center;
        }

        #status-line {
            color: var(--muted);
            font-size: 12px;
        }

        @media (max-width: 960px) {
            #content {
                grid-template-columns: 1fr;
                overflow: auto;
            }

            .panel {
                min-height: 420px;
            }
        }
    </style>
</head>
<body>
    <div id="shell">
        <header id="topbar">
            <div>
                <div id="eyebrow">AIGRIL SELF EVOLUTION</div>
                <h1>自我进化中心</h1>
                <p id="subtitle">把“越用越懂你”“工具越修越稳”“新任务自动补能力”拆成可审计的提案。AIGRIL 可以建议修改记忆、工具、MCP、Skill 和自身代码，但真正应用前必须经过验证、审批和回滚记录。</p>
            </div>
            <div id="top-actions">
                <button id="refresh-btn" class="btn" type="button">刷新</button>
                <button id="analyze-btn" class="btn primary" type="button">重新分析</button>
                <button id="close-btn" class="btn" type="button">关闭</button>
            </div>
        </header>

        <main id="content">
            <section class="panel">
                <div class="panel-head">
                    <div>
                        <div class="panel-title">演化提案</div>
                        <div class="panel-copy">偏好沉淀、工具瓶颈、能力补齐和自修复入口。</div>
                    </div>
                    <div id="status-line">准备中...</div>
                </div>
                <div id="summary-strip">
                    <div class="metric">
                        <div id="metric-active" class="metric-value">0</div>
                        <div class="metric-label">待处理</div>
                    </div>
                    <div class="metric">
                        <div id="metric-total" class="metric-value">0</div>
                        <div class="metric-label">全部提案</div>
                    </div>
                    <div class="metric">
                        <div id="metric-high" class="metric-value">0</div>
                        <div class="metric-label">高风险</div>
                    </div>
                </div>
                <div id="task-row">
                    <input id="task-input" placeholder="可选：输入一个新任务，让系统检索可能缺失的 Skill/MCP 能力">
                    <button id="task-analyze-btn" class="btn" type="button">按任务分析</button>
                </div>
                <div id="proposal-list"></div>
            </section>

            <section class="panel">
                <div class="panel-head">
                    <div>
                        <div class="panel-title">提案详情</div>
                        <div class="panel-copy">这里展示人类可读的原因、证据、风险门禁和候选变更。</div>
                    </div>
                </div>
                <div id="detail-body"></div>
                <div id="detail-actions">
                    <button id="apply-btn" class="btn primary" type="button" disabled>批准并执行</button>
                    <button id="approve-btn" class="btn" type="button" disabled>仅标记批准</button>
                    <button id="reject-btn" class="btn danger" type="button" disabled>拒绝</button>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="./src/self-evolution-app.js"></script>
</body>
</html>
